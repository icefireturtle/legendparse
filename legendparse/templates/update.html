<html>
    <head>
        <title>Update Message</title>
    </head>
    <body>
        <h2>Update Message</h2>
        <form action="/update/{{id}}" method="POST">
            <label>Update Message {{id}}:</label>
            <input type="textarea" name="message" value="{{message}}">
            <button type="submit">Update</button>
        </form>
    </body>
</html>
