<html>
    <head>
        <title>Parser</title>
        <link rel="stylesheet" href="{{ url_for('static', filename='bootstrap.min.css')}}" />
        <link rel="stylesheet" href="{{ url_for('static', filename='style.css')}}" />
    </head>
    <body>
        <div align="center">
            <div align="center">
                <h2>Navigation</h2>
                <nav>
                    <a href="/">Home</a>
                </nav>
            </div>
            <div align="center">
                <h2>Add Message</h2> 
                <form action="/add_message" method="POST">
                    <table>
                        <colgroup>
                            <col />
                            <col style="width: 450px;" />
                        </colgroup>
                        <thead>
                            <th>Record Type</th>
                            <th colspan="2">Message</th>
                        </thead>
                        <tbody>
                            <tr>
                                <td><select id="mRecordType" name="mRecordType">
                                    {% for data in record_types %}
                                    <option>{{data.record_type}}</option>
                                    {% endfor %}
                                </select></td>
                                <td style="line-height: 25px;"><textarea name="message" class="message" placeholder="Insert message here..."></textarea></td>
                                <td><button type="submit" class="btn btn-outline-success">Add</button></td>
                            </tr>
                        </tbody>
                    </table>
                </form>
                    <br />
                <h2>Create Parser Parameters for Message Record</h2>
                <form action="/add_record" method="POST" id="parameters">
                    <table>
                        <thead>
                            <th>Record Type</th>
                        </thead>
                        <tbody>
                            <tr>
                                <td><input type="text" name="recordType" placeholder="MAX 5 Characters" maxlength="5"></td>
                            </tr>
                        </tbody>
                    </table>
                    <br />
                        <table id="paramsContainer">
                        <thead>
                            <th>Field Name</th>
                            <th>Field Length</th>
                            <th colspan="2">Field Description</th>
                        </thead>
                        <tbody>
                            <tr class="paramsWrapper">
                                <td><input type="text" name="fieldName" id="fieldName1" placeholder="Field Name" required></td>
                                <td><input type="text" name="fieldLength" id="fieldLength1" placeholder="String Length" required></td>
                                <td><input type="text" name="fieldDesc" id="fieldDesc1" placeholder="Description"></td>
                                <td><button class="removeField btn btn-outline-danger btn-sm">Remove</button></td>
                            </tr>
                            </tbody>
                            <tfoot>
                                <tr>
                                    <td colspan="4" style="vertical-align: middle;" align="center"><button id="addFields" class="btn btn-outline-info">Add Field</button>
                                    <button type="submit" class="btn btn-outline-success">Create Message Parameters</button></td>
                                </tr>
                            </tfoot>
                        </table>
                    </div>
                </form>
            </div>
        <script>
            let elementCount = 0;

            document.getElementById('addFields').addEventListener('click', function(event){
            event.preventDefault();
            elementCount+=1;

            const paramsContainer = document.getElementById('paramsContainer');
            const wrapper = document.createElement('tr');
            wrapper.className = 'paramsWrapper'; 

            var newFieldNameCell = document.createElement('td');
            var newFieldLengthCell = document.createElement('td');
            var newFieldDescCell = document.createElement('td');

            var newFieldNameInput = document.createElement('input');
            var newFieldLengthInput = document.createElement('input');
            var newFieldDescInput = document.createElement('input');
            
            newFieldNameInput.type = 'text';
            newFieldNameInput.name = 'fieldName';
            newFieldNameInput.id = 'fieldName' + (elementCount + 1);
            newFieldNameInput.placeholder = 'Field Name ' + (elementCount + 1);

            newFieldLengthInput.type = 'text';
            newFieldLengthInput.name = 'fieldLength';
            newFieldLengthInput.id = 'fieldLength' + (elementCount + 1);
            newFieldLengthInput.placeholder = 'Field Length ' + (elementCount + 1);

            newFieldDescInput.type = 'text';
            newFieldDescInput.name = 'fieldDesc';
            newFieldDescInput.id = 'fieldDesc' + (elementCount + 1);
            newFieldDescInput.placeholder = 'Field Description ' + (elementCount + 1);

            wrapper.append(newFieldNameCell);
            wrapper.append(newFieldLengthCell);
            wrapper.append(newFieldDescCell);
            
            newFieldNameCell.appendChild(newFieldNameInput);
            newFieldLengthCell.appendChild(newFieldLengthInput);
            newFieldDescCell.appendChild(newFieldDescInput);

            var removeButton = document.createElement('button');
            removeButton.textContent = 'Remove';
            removeButton.classList.add('removeField','btn','btn-outline-danger','btn-sm');
            removeButton.addEventListener('click', function(event) {
                event.preventDefault();
                event.currentTarget.parentElement.remove();
                console.log(event.currentTarget.parentElement, event.currentTarget.closest('.paramsWrapper'));
                elementCount-=1;
            });

            wrapper.appendChild(removeButton);
            paramsContainer.appendChild(wrapper);
        });
        </script>
    </body>
</html>
